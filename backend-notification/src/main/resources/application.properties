quarkus.http.port=8083
quarkus.http.root-path=/api
quarkus.smallrye-openapi.path=/openapi
mp.openapi.scan.disable=true

quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${NOTIFICATION_DB_USERNAME:notification}
quarkus.datasource.password=${NOTIFICATION_DB_PASSWORD:notification}
quarkus.datasource.jdbc.url=${NOTIFICATION_DB_URL:jdbc:postgresql://localhost:5434/notification}
quarkus.hibernate-orm.database.generation=none
quarkus.flyway.migrate-at-start=true

notification.outbox.batch-size=${NOTIFICATION_OUTBOX_BATCH_SIZE:10}
notification.outbox.processing-interval=${NOTIFICATION_OUTBOX_PROCESSING_INTERVAL:2s}
notification.outbox.max-attempts=${NOTIFICATION_OUTBOX_MAX_ATTEMPTS:3}
notification.outbox.retry-delay=${NOTIFICATION_OUTBOX_RETRY_DELAY:30s}

kafka.bootstrap.servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:29092}

mp.messaging.incoming.notification-commands.connector=smallrye-kafka
mp.messaging.incoming.notification-commands.topic=notification.commands
mp.messaging.incoming.notification-commands.group.id=backend-notification
mp.messaging.incoming.notification-commands.value.deserializer=org.apache.kafka.common.serialization.StringDeserializer
mp.messaging.incoming.notification-commands.auto.offset.reset=earliest
mp.messaging.incoming.notification-commands.failure-strategy=dead-letter-queue
mp.messaging.incoming.notification-commands.dead-letter-queue.topic=notification.commands.dlq

mp.messaging.outgoing.notification-events.connector=smallrye-kafka
mp.messaging.outgoing.notification-events.topic=notification.events
mp.messaging.outgoing.notification-events.value.serializer=org.apache.kafka.common.serialization.StringSerializer
mp.messaging.outgoing.notification-events.acks=all

quarkus.mailer.from=${MAIL_FROM:no-reply@example.com}
quarkus.mailer.host=${MAIL_HOST:localhost}
quarkus.mailer.port=${MAIL_PORT:1025}
quarkus.mailer.username=${MAIL_USERNAME:}
quarkus.mailer.password=${MAIL_PASSWORD:}
quarkus.mailer.mock=${MAIL_MOCK:false}
