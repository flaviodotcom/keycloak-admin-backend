quarkus.http.port=8082
quarkus.http.root-path=/api
quarkus.smallrye-openapi.path=/openapi
mp.openapi.scan.disable=true

quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${AUDIT_DB_USERNAME:audit}
quarkus.datasource.password=${AUDIT_DB_PASSWORD:audit}
quarkus.datasource.jdbc.url=${AUDIT_DB_URL:jdbc:postgresql://localhost:5433/audit}
quarkus.hibernate-orm.database.generation=none
quarkus.flyway.migrate-at-start=true

kafka.bootstrap.servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:29092}

mp.messaging.incoming.identity-events.connector=smallrye-kafka
mp.messaging.incoming.identity-events.topic=identity.events
mp.messaging.incoming.identity-events.group.id=backend-audit-identity
mp.messaging.incoming.identity-events.value.deserializer=org.apache.kafka.common.serialization.StringDeserializer
mp.messaging.incoming.identity-events.auto.offset.reset=earliest
mp.messaging.incoming.identity-events.failure-strategy=dead-letter-queue
mp.messaging.incoming.identity-events.dead-letter-queue.topic=identity.events.audit.dlq

mp.messaging.incoming.notification-events.connector=smallrye-kafka
mp.messaging.incoming.notification-events.topic=notification.events
mp.messaging.incoming.notification-events.group.id=backend-audit-notification
mp.messaging.incoming.notification-events.value.deserializer=org.apache.kafka.common.serialization.StringDeserializer
mp.messaging.incoming.notification-events.auto.offset.reset=earliest
mp.messaging.incoming.notification-events.failure-strategy=dead-letter-queue
mp.messaging.incoming.notification-events.dead-letter-queue.topic=notification.events.audit.dlq
