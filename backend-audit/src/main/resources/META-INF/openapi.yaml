openapi: 3.0.3
info:
  title: Backend Audit API
  version: 1.0.0
  description: Audit service for identity and notification events consumed from Kafka.
servers:
  - url: /api
paths:
  /v1/audit-events:
    get:
      summary: List audit events
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 50
            minimum: 1
      responses:
        "200":
          description: Audit events ordered by newest received date.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AuditEvent"
  /v1/audit-events/{eventId}:
    get:
      summary: Find an audit event by event id
      parameters:
        - name: eventId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Audit event found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuditEvent"
        "404":
          description: Audit event not found.
components:
  schemas:
    AuditEvent:
      type: object
      properties:
        eventId:
          type: string
        schemaVersion:
          type: integer
          format: int32
        topic:
          type: string
          example: identity.events
        eventType:
          type: string
          example: identity.user.created
        source:
          type: string
          example: backend-keycloak
        correlationId:
          type: string
        actorId:
          type: string
        subjectType:
          type: string
          nullable: true
        subjectId:
          type: string
          nullable: true
        occurredAt:
          type: string
          format: date-time
          nullable: true
        receivedAt:
          type: string
          format: date-time
        payloadJson:
          type: string
