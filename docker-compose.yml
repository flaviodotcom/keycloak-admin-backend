services:
  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    container_name: keycloak-admin-platform
    command:
      - start-dev
      - --import-realm
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: myKeycloakAdminUser
      KC_BOOTSTRAP_ADMIN_PASSWORD: tops3cr3t
      KC_DB: dev-file
      JAVA_TOOL_OPTIONS: >
        -agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=*:5005
    ports:
      - "8080:8080"
      - "5005:5005"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health/ready || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  kafka:
    image: bitnami/kafka:3.8
    container_name: keycloak-admin-platform-kafka
    environment:
      KAFKA_CFG_NODE_ID: 1
      KAFKA_CFG_PROCESS_ROLES: broker,controller
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:29092
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:29092
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: true
      ALLOW_PLAINTEXT_LISTENER: yes
    ports:
      - "29092:29092"
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 10

  kafka-ui:
    image: provectuslabs/kafka-ui:v0.7.2
    container_name: keycloak-admin-platform-kafka-ui
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    ports:
      - "8084:8080"

  mailpit:
    image: axllent/mailpit:v1.21
    container_name: keycloak-admin-platform-mailpit
    ports:
      - "1025:1025"
      - "8025:8025"

  postgres-audit:
    image: postgres:16
    container_name: keycloak-admin-platform-postgres-audit
    environment:
      POSTGRES_DB: audit
      POSTGRES_USER: audit
      POSTGRES_PASSWORD: audit
    ports:
      - "5433:5432"
    volumes:
      - postgres-audit-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U audit -d audit"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend-keycloak:
    image: maven:3.9.12-eclipse-temurin-21
    container_name: backend-keycloak
    profiles:
      - admin
    working_dir: /workspace
    command: ./mvnw -pl backend-keycloak quarkus:dev -Dquarkus.http.host=0.0.0.0
    depends_on:
      keycloak:
        condition: service_started
      kafka:
        condition: service_healthy
    environment:
      KEYCLOAK_SERVER_URL: http://keycloak:8080
      KEYCLOAK_REALM: user-management
      KEYCLOAK_ADMIN_CLIENT_ID: backend-keycloak-admin
      KEYCLOAK_ADMIN_CLIENT_SECRET: change-me
      KEYCLOAK_OIDC_CLIENT_ID: backend-users
      KEYCLOAK_OIDC_CLIENT_SECRET: change-me
      IDENTITY_EVENTS_ENABLED: "false"
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    ports:
      - "8081:8081"
    volumes:
      - .:/workspace
      - maven-repository:/root/.m2

  backend-audit:
    image: maven:3.9.12-eclipse-temurin-21
    container_name: backend-audit
    profiles:
      - audit
    working_dir: /workspace
    command: ./mvnw -pl backend-audit quarkus:dev -Dquarkus.http.host=0.0.0.0
    depends_on:
      kafka:
        condition: service_healthy
      postgres-audit:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      AUDIT_DB_URL: jdbc:postgresql://postgres-audit:5432/audit
      AUDIT_DB_USERNAME: audit
      AUDIT_DB_PASSWORD: audit
    ports:
      - "8082:8082"
    volumes:
      - .:/workspace
      - maven-repository:/root/.m2

  backend-notification:
    image: maven:3.9.12-eclipse-temurin-21
    container_name: backend-notification
    profiles:
      - notification
    working_dir: /workspace
    command: ./mvnw -pl backend-notification quarkus:dev -Dquarkus.http.host=0.0.0.0
    depends_on:
      kafka:
        condition: service_healthy
      mailpit:
        condition: service_started
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      MAIL_HOST: mailpit
      MAIL_PORT: 1025
      MAIL_FROM: no-reply@example.com
    ports:
      - "8083:8083"
    volumes:
      - .:/workspace
      - maven-repository:/root/.m2

volumes:
  postgres-audit-data:
  maven-repository:
