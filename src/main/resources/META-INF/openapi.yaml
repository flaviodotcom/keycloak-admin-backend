openapi: 3.0.3
info:
  title: Keycloak Admin Backend API
  version: 1.0.0
  description: |
    Generic REST backend for managing users, groups, roles and User Profile
    attributes in a Keycloak realm.

    The API keeps Keycloak Admin Client details behind a stable HTTP contract.
    List endpoints return API-level paginated responses. Pagination is applied
    after the final filtering and sorting step because some filters are handled
    by the backend for case-insensitive and accent-insensitive matching.

    Error titles, details and validation messages can be localized with the
    `Accept-Language` header. If no supported language is requested, English is
    used.
servers:
  - url: http://localhost:8081/api
    description: Local development server
tags:
  - name: Users
    description: User management operations.
  - name: Groups
    description: Group management and membership operations.
  - name: Roles
    description: Realm role management operations.
  - name: User Profile Attributes
    description: Keycloak User Profile attribute operations.
  - name: Health
    description: Kubernetes-friendly liveness and readiness endpoints.
paths:
  /v1/users:
    get:
      tags:
        - Users
      summary: Search users
      description: |
        Searches users by supported Keycloak fields and API-side filters.
        Use `includeGroups=true` to include lightweight group objects in each
        user response.
      operationId: findUsers
      parameters:
        - $ref: '#/components/parameters/AcceptLanguage'
        - name: search
          in: query
          schema:
            type: string
          description: Generic user search term.
        - name: username
          in: query
          schema:
            type: string
          description: Username filter.
        - name: email
          in: query
          schema:
            type: string
          description: Email filter.
        - name: firstName
          in: query
          schema:
            type: string
          description: First name filter.
        - name: lastName
          in: query
          schema:
            type: string
          description: Last name filter.
        - name: enabled
          in: query
          schema:
            type: boolean
          description: Filters by enabled state.
        - name: exact
          in: query
          schema:
            type: boolean
          description: Requests exact matching where supported.
        - name: includeGroups
          in: query
          schema:
            type: boolean
            default: false
          description: Includes lightweight group objects in each user response.
        - name: attr.<name>
          in: query
          schema:
            type: string
          description: |
            Attribute filter using the `attr.` prefix. Example:
            `attr.department=Finance`.
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Size'
        - $ref: '#/components/parameters/Sort'
        - name: sortBy
          in: query
          schema:
            type: string
            default: username
            enum:
              - id
              - username
              - email
              - firstName
              - lastName
              - enabled
              - createdTimestamp
          description: User field used for API-level sorting.
      responses:
        '200':
          description: Users found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserPageResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalServerError'
    post:
      tags:
        - Users
      summary: Create a user
      description: |
        Creates a user and assigns the groups provided in `groupIds`.

        The update-password email is intentionally not sent during user
        creation. Call `/api/v1/users/{id}/actions/update-password-email` when the
        application wants Keycloak to send that email.

        If the user is created but group assignment fails, the backend removes
        the newly created user and propagates the original error.
      operationId: createUser
      parameters:
        - $ref: '#/components/parameters/AcceptLanguage'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserRequest'
            example:
              username: maria.teste
              email: maria.teste@example.com
              firstName: Maria
              lastName: Teste
              enabled: true
              emailVerified: false
              attributes:
                departamento:
                  - RH
              groupIds:
                - group-id-1
      responses:
        '201':
          description: User created.
          headers:
            Location:
              $ref: '#/components/headers/Location'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '400':
          $ref: '#/components/responses/ValidationProblem'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/BusinessRuleViolation'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/users/{id}:
    get:
      tags:
        - Users
      summary: Find a user by id
      operationId: findUserById
      parameters:
        - $ref: '#/components/parameters/AcceptLanguage'
        - $ref: '#/components/parameters/Id'
        - name: includeGroups
          in: query
          schema:
            type: boolean
            default: false
          description: Includes lightweight group objects in the user response.
      responses:
        '200':
          description: User found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    put:
      tags:
        - Users
      summary: Replace a user
      description: |
        Replaces the user representation. Missing fields that have DTO defaults
        keep their default values. Missing `attributes` becomes an empty map,
        which clears existing attributes.
      operationId: updateUser
      parameters:
        - $ref: '#/components/parameters/AcceptLanguage'
        - $ref: '#/components/parameters/Id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserRequest'
      responses:
        '200':
          description: User updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '400':
          $ref: '#/components/responses/ValidationProblem'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/BusinessRuleViolation'
        '500':
          $ref: '#/components/responses/InternalServerError'
    patch:
      tags:
        - Users
      summary: Partially update a user
      description: |
        Updates only fields present in the request. Missing `attributes`
        preserves current attributes. `attributes: {}` clears attributes.
      operationId: patchUser
      parameters:
        - $ref: '#/components/parameters/AcceptLanguage'
        - $ref: '#/components/parameters/Id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchUserRequest'
      responses:
        '200':
          description: User partially updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '400':
          $ref: '#/components/responses/ValidationProblem'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/BusinessRuleViolation'
        '500':
          $ref: '#/components/responses/InternalServerError'
    delete:
      tags:
        - Users
      summary: Delete a user
      operationId: deleteUser
      parameters:
        - $ref: '#/components/parameters/AcceptLanguage'
        - $ref: '#/components/parameters/Id'
      responses:
        '204':
          description: User deleted.
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/users/{id}/actions/update-password-email:
    post:
      tags:
        - Users
      summary: Send update-password email
      description: |
        Asks Keycloak to execute the `UPDATE_PASSWORD` required action email
        for the user. Keycloak SMTP must be configured for this operation to
        succeed.
      operationId: sendUpdatePasswordEmail
      parameters:
        - $ref: '#/components/parameters/AcceptLanguage'
        - $ref: '#/components/parameters/Id'
      responses:
        '204':
          description: Keycloak accepted the email action request.
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/UpdatePasswordEmailError'
  /v1/users/{id}/groups/{groupId}:
    post:
      tags:
        - Users
      summary: Assign a group to a user
      operationId: assignUserGroup
      parameters:
        - $ref: '#/components/parameters/AcceptLanguage'
        - $ref: '#/components/parameters/Id'
        - $ref: '#/components/parameters/GroupId'
      responses:
        '204':
          description: Group assigned to the user.
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    delete:
      tags:
        - Users
      summary: Unassign a group from a user
      operationId: unassignUserGroup
      parameters:
        - $ref: '#/components/parameters/AcceptLanguage'
        - $ref: '#/components/parameters/Id'
        - $ref: '#/components/parameters/GroupId'
      responses:
        '204':
          description: Group unassigned from the user.
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/users/{id}/roles/realm/{roleName}:
    post:
      tags:
        - Users
      summary: Assign a realm role to a user
      operationId: assignUserRealmRole
      parameters:
        - $ref: '#/components/parameters/AcceptLanguage'
        - $ref: '#/components/parameters/Id'
        - $ref: '#/components/parameters/RoleName'
      responses:
        '204':
          description: Realm role assigned to the user.
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    delete:
      tags:
        - Users
      summary: Unassign a realm role from a user
      operationId: unassignUserRealmRole
      parameters:
        - $ref: '#/components/parameters/AcceptLanguage'
        - $ref: '#/components/parameters/Id'
        - $ref: '#/components/parameters/RoleName'
      responses:
        '204':
          description: Realm role unassigned from the user.
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/users/{id}/roles/clients/{clientId}/{roleName}:
    post:
      tags:
        - Users
      summary: Assign a client role to a user
      operationId: assignUserClientRole
      parameters:
        - $ref: '#/components/parameters/AcceptLanguage'
        - $ref: '#/components/parameters/Id'
        - $ref: '#/components/parameters/ClientId'
        - $ref: '#/components/parameters/RoleName'
      responses:
        '204':
          description: Client role assigned to the user.
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/BusinessRuleViolation'
        '500':
          $ref: '#/components/responses/InternalServerError'
    delete:
      tags:
        - Users
      summary: Unassign a client role from a user
      operationId: unassignUserClientRole
      parameters:
        - $ref: '#/components/parameters/AcceptLanguage'
        - $ref: '#/components/parameters/Id'
        - $ref: '#/components/parameters/ClientId'
        - $ref: '#/components/parameters/RoleName'
      responses:
        '204':
          description: Client role unassigned from the user.
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/BusinessRuleViolation'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/users/{id}/password:
    put:
      tags:
        - Users
      summary: Reset a user password
      operationId: resetUserPassword
      parameters:
        - $ref: '#/components/parameters/AcceptLanguage'
        - $ref: '#/components/parameters/Id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResetPasswordRequest'
            example:
              value: ChangeMe123!
              temporary: true
      responses:
        '204':
          description: Password reset.
        '400':
          $ref: '#/components/responses/ValidationProblem'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/users/{id}/required-actions:
    put:
      tags:
        - Users
      summary: Update user required actions
      operationId: updateUserRequiredActions
      parameters:
        - $ref: '#/components/parameters/AcceptLanguage'
        - $ref: '#/components/parameters/Id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RequiredActionsRequest'
            example:
              actions:
                - UPDATE_PASSWORD
                - VERIFY_EMAIL
      responses:
        '204':
          description: Required actions updated.
        '400':
          $ref: '#/components/responses/ValidationProblem'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/users/{id}/sessions:
    get:
      tags:
        - Users
      summary: List user sessions
      operationId: findUserSessions
      parameters:
        - $ref: '#/components/parameters/AcceptLanguage'
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: User sessions found.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UserSessionResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    delete:
      tags:
        - Users
      summary: Logout a user from all sessions
      operationId: logoutUser
      parameters:
        - $ref: '#/components/parameters/AcceptLanguage'
        - $ref: '#/components/parameters/Id'
      responses:
        '204':
          description: User logged out.
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/users/{id}/sessions/{sessionId}:
    delete:
      tags:
        - Users
      summary: Delete a user session
      operationId: deleteUserSession
      parameters:
        - $ref: '#/components/parameters/AcceptLanguage'
        - $ref: '#/components/parameters/Id'
        - $ref: '#/components/parameters/SessionId'
      responses:
        '204':
          description: User session deleted.
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/BusinessRuleViolation'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/users/attributes:
    post:
      tags:
        - User Profile Attributes
      summary: Create a User Profile attribute
      description: |
        Creates a Keycloak User Profile attribute managed by this backend.

        If `insensitive=true`, an internal `__search_<attributeName>` attribute
        is created for normalized search values.

        If the User Profile update succeeds but localization fails, the backend
        removes the newly created attribute or attributes and propagates the
        original error.
      operationId: createUserAttribute
      parameters:
        - $ref: '#/components/parameters/AcceptLanguage'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserAttributeRequest'
            example:
              name: departamento
              displayName:
                en: Department
                pt-BR: Departamento
              insensitive: true
              required: false
              multivalued: false
      responses:
        '201':
          description: User Profile attribute created.
          headers:
            Location:
              $ref: '#/components/headers/Location'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserAttributeResponse'
        '400':
          $ref: '#/components/responses/ValidationProblem'
        '422':
          $ref: '#/components/responses/BusinessRuleViolation'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/users/attributes/{name}:
    put:
      tags:
        - User Profile Attributes
      summary: Update a User Profile attribute
      description: |
        Updates a Keycloak User Profile attribute managed by this backend.
        If localization update fails after the User Profile update, the backend
        restores the previous User Profile attribute configuration and
        propagates the original error.
      operationId: updateUserAttribute
      parameters:
        - $ref: '#/components/parameters/AcceptLanguage'
        - $ref: '#/components/parameters/AttributeName'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserAttributeRequest'
      responses:
        '200':
          description: User Profile attribute updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserAttributeResponse'
        '400':
          $ref: '#/components/responses/ValidationProblem'
        '422':
          $ref: '#/components/responses/BusinessRuleViolation'
        '500':
          $ref: '#/components/responses/InternalServerError'
    delete:
      tags:
        - User Profile Attributes
      summary: Delete a User Profile attribute
      operationId: deleteUserAttribute
      parameters:
        - $ref: '#/components/parameters/AcceptLanguage'
        - $ref: '#/components/parameters/AttributeName'
      responses:
        '204':
          description: User Profile attribute deleted.
        '422':
          $ref: '#/components/responses/BusinessRuleViolation'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/groups:
    get:
      tags:
        - Groups
      summary: Search groups
      description: Searches root groups and nested groups.
      operationId: findGroups
      parameters:
        - $ref: '#/components/parameters/AcceptLanguage'
        - name: search
          in: query
          schema:
            type: string
          description: Generic group search term.
        - name: name
          in: query
          schema:
            type: string
          description: Group name filter.
        - name: exact
          in: query
          schema:
            type: boolean
          description: Requests exact matching where supported.
        - name: attr.<name>
          in: query
          schema:
            type: string
          description: Attribute filter using the `attr.` prefix.
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Size'
        - $ref: '#/components/parameters/Sort'
        - name: sortBy
          in: query
          schema:
            type: string
            default: name
            enum:
              - id
              - name
              - path
          description: Group field used for API-level sorting.
      responses:
        '200':
          description: Groups found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GroupPageResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalServerError'
    post:
      tags:
        - Groups
      summary: Create a group
      operationId: createGroup
      parameters:
        - $ref: '#/components/parameters/AcceptLanguage'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateGroupRequest'
            example:
              name: Financeiro
              parentGroupId: parent-group-id
              attributes:
                departmentCode:
                  - FIN
      responses:
        '201':
          description: Group created.
          headers:
            Location:
              $ref: '#/components/headers/Location'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GroupResponse'
        '400':
          $ref: '#/components/responses/ValidationProblem'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/groups/{id}:
    get:
      tags:
        - Groups
      summary: Find a group by id
      operationId: findGroupById
      parameters:
        - $ref: '#/components/parameters/AcceptLanguage'
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: Group found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GroupResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    put:
      tags:
        - Groups
      summary: Update a group
      operationId: updateGroup
      parameters:
        - $ref: '#/components/parameters/AcceptLanguage'
        - $ref: '#/components/parameters/Id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateGroupRequest'
      responses:
        '200':
          description: Group updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GroupResponse'
        '400':
          $ref: '#/components/responses/ValidationProblem'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalServerError'
    delete:
      tags:
        - Groups
      summary: Delete a group
      operationId: deleteGroup
      parameters:
        - $ref: '#/components/parameters/AcceptLanguage'
        - $ref: '#/components/parameters/Id'
      responses:
        '204':
          description: Group deleted.
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/groups/{id}/members:
    get:
      tags:
        - Groups
      summary: List group members
      operationId: findGroupMembers
      parameters:
        - $ref: '#/components/parameters/AcceptLanguage'
        - $ref: '#/components/parameters/Id'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Size'
        - $ref: '#/components/parameters/Sort'
        - name: sortBy
          in: query
          schema:
            type: string
            default: username
            enum:
              - id
              - username
              - email
              - firstName
              - lastName
              - enabled
              - createdTimestamp
          description: User field used for API-level sorting.
      responses:
        '200':
          description: Group members found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserPageResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/groups/{id}/roles/realm/{roleName}:
    post:
      tags:
        - Groups
      summary: Assign a realm role to a group
      operationId: assignGroupRealmRole
      parameters:
        - $ref: '#/components/parameters/AcceptLanguage'
        - $ref: '#/components/parameters/Id'
        - $ref: '#/components/parameters/RoleName'
      responses:
        '204':
          description: Realm role assigned to the group.
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    delete:
      tags:
        - Groups
      summary: Unassign a realm role from a group
      operationId: unassignGroupRealmRole
      parameters:
        - $ref: '#/components/parameters/AcceptLanguage'
        - $ref: '#/components/parameters/Id'
        - $ref: '#/components/parameters/RoleName'
      responses:
        '204':
          description: Realm role unassigned from the group.
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/groups/{id}/roles/clients/{clientId}/{roleName}:
    post:
      tags:
        - Groups
      summary: Assign a client role to a group
      operationId: assignGroupClientRole
      parameters:
        - $ref: '#/components/parameters/AcceptLanguage'
        - $ref: '#/components/parameters/Id'
        - $ref: '#/components/parameters/ClientId'
        - $ref: '#/components/parameters/RoleName'
      responses:
        '204':
          description: Client role assigned to the group.
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/BusinessRuleViolation'
        '500':
          $ref: '#/components/responses/InternalServerError'
    delete:
      tags:
        - Groups
      summary: Unassign a client role from a group
      operationId: unassignGroupClientRole
      parameters:
        - $ref: '#/components/parameters/AcceptLanguage'
        - $ref: '#/components/parameters/Id'
        - $ref: '#/components/parameters/ClientId'
        - $ref: '#/components/parameters/RoleName'
      responses:
        '204':
          description: Client role unassigned from the group.
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/BusinessRuleViolation'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/roles:
    get:
      tags:
        - Roles
      summary: Search realm roles
      operationId: findRoles
      parameters:
        - $ref: '#/components/parameters/AcceptLanguage'
        - name: name
          in: query
          schema:
            type: string
          description: Role name filter.
        - name: exact
          in: query
          schema:
            type: boolean
          description: Requests exact matching where supported.
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Size'
        - $ref: '#/components/parameters/Sort'
        - name: sortBy
          in: query
          schema:
            type: string
            default: name
            enum:
              - id
              - name
              - description
          description: Role field used for API-level sorting.
      responses:
        '200':
          description: Roles found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RolePageResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalServerError'
    post:
      tags:
        - Roles
      summary: Create a realm role
      operationId: createRole
      parameters:
        - $ref: '#/components/parameters/AcceptLanguage'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRoleRequest'
            example:
              name: manager
              description: Manager role
      responses:
        '201':
          description: Role created.
          headers:
            Location:
              $ref: '#/components/headers/Location'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoleResponse'
        '400':
          $ref: '#/components/responses/ValidationProblem'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/roles/{id}:
    get:
      tags:
        - Roles
      summary: Find a realm role by id
      operationId: findRoleById
      parameters:
        - $ref: '#/components/parameters/AcceptLanguage'
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: Role found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoleResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    put:
      tags:
        - Roles
      summary: Update a realm role
      operationId: updateRole
      parameters:
        - $ref: '#/components/parameters/AcceptLanguage'
        - $ref: '#/components/parameters/Id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateRoleRequest'
      responses:
        '200':
          description: Role updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoleResponse'
        '400':
          $ref: '#/components/responses/ValidationProblem'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalServerError'
    delete:
      tags:
        - Roles
      summary: Delete a realm role
      operationId: deleteRole
      parameters:
        - $ref: '#/components/parameters/AcceptLanguage'
        - $ref: '#/components/parameters/Id'
      responses:
        '204':
          description: Role deleted.
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /q/health:
    get:
      tags:
        - Health
      summary: Application health
      operationId: health
      responses:
        '200':
          description: Application is healthy.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
        '503':
          description: Application is unhealthy.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
  /q/health/live:
    get:
      tags:
        - Health
      summary: Liveness health check
      operationId: liveness
      responses:
        '200':
          description: Application process is alive.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
  /q/health/ready:
    get:
      tags:
        - Health
      summary: Readiness health check
      description: Validates basic Keycloak connectivity.
      operationId: readiness
      responses:
        '200':
          description: Application is ready to receive traffic.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
        '503':
          description: Keycloak connectivity is unavailable.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        Bearer token issued by the configured Keycloak realm. Endpoints are not
        protected by default; apply Quarkus security annotations as needed.
  headers:
    Location:
      description: URI of the created resource.
      schema:
        type: string
        format: uri
  parameters:
    AcceptLanguage:
      name: Accept-Language
      in: header
      required: false
      schema:
        type: string
        example: pt-BR
      description: Preferred response language. Unsupported values use English.
    Id:
      name: id
      in: path
      required: true
      schema:
        type: string
      description: Keycloak resource identifier.
    GroupId:
      name: groupId
      in: path
      required: true
      schema:
        type: string
      description: Keycloak group identifier.
    ClientId:
      name: clientId
      in: path
      required: true
      schema:
        type: string
      description: Keycloak client id.
    RoleName:
      name: roleName
      in: path
      required: true
      schema:
        type: string
      description: Keycloak role name.
    SessionId:
      name: sessionId
      in: path
      required: true
      schema:
        type: string
      description: Keycloak user session identifier.
    AttributeName:
      name: name
      in: path
      required: true
      schema:
        type: string
      description: Keycloak User Profile public attribute name.
    Page:
      name: page
      in: query
      required: false
      schema:
        type: integer
        format: int32
        minimum: 0
        default: 0
      description: Zero-based page index.
    Size:
      name: size
      in: query
      required: false
      schema:
        type: integer
        format: int32
        minimum: 1
        maximum: 100
        default: 10
      description: Page size.
    Sort:
      name: sort
      in: query
      required: false
      schema:
        type: string
        enum:
          - asc
          - desc
        default: asc
      description: Sort direction.
  responses:
    BadRequest:
      description: Invalid query parameter or request data.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Problem'
    ValidationProblem:
      description: Request body validation failed.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Problem'
    BusinessRuleViolation:
      description: Business rule violation.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Problem'
    Conflict:
      description: Resource conflict, such as duplicate user, group or role data.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Problem'
    NotFound:
      description: Resource not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Problem'
    UpdatePasswordEmailError:
      description: Keycloak could not send the update-password email.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Problem'
          example:
            status: 500
            title: Internal server error
            detail: Could not send the update password email. Check the SMTP configuration.
            timestamp: '2026-04-28T12:00:00-03:00'
    InternalServerError:
      description: Unexpected server error.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Problem'
  schemas:
    AttributeMap:
      type: object
      additionalProperties:
        type: array
        items:
          type: string
      example:
        departamento:
          - RH
    LocalizedTextMap:
      type: object
      additionalProperties:
        type: string
      example:
        en: Department
        pt-BR: Departamento
    CreateUserRequest:
      type: object
      required:
        - username
      properties:
        username:
          type: string
          minLength: 1
        email:
          type: string
          format: email
          nullable: true
        firstName:
          type: string
          nullable: true
        lastName:
          type: string
          nullable: true
        enabled:
          type: boolean
          default: true
        emailVerified:
          type: boolean
          default: false
        attributes:
          $ref: '#/components/schemas/AttributeMap'
        groupIds:
          type: array
          items:
            type: string
            minLength: 1
          default: []
      additionalProperties: false
    UpdateUserRequest:
      type: object
      required:
        - username
      properties:
        username:
          type: string
          minLength: 1
        email:
          type: string
          format: email
          nullable: true
        firstName:
          type: string
          nullable: true
        lastName:
          type: string
          nullable: true
        enabled:
          type: boolean
          default: true
        emailVerified:
          type: boolean
          default: false
        attributes:
          $ref: '#/components/schemas/AttributeMap'
      additionalProperties: false
    PatchUserRequest:
      type: object
      properties:
        username:
          type: string
          minLength: 1
          nullable: true
        email:
          type: string
          format: email
          nullable: true
        firstName:
          type: string
          nullable: true
        lastName:
          type: string
          nullable: true
        enabled:
          type: boolean
          nullable: true
        emailVerified:
          type: boolean
          nullable: true
        attributes:
          allOf:
            - $ref: '#/components/schemas/AttributeMap'
          nullable: true
      additionalProperties: false
    ResetPasswordRequest:
      type: object
      required:
        - value
      properties:
        value:
          type: string
          minLength: 1
        temporary:
          type: boolean
          default: false
      additionalProperties: false
    RequiredActionsRequest:
      type: object
      required:
        - actions
      properties:
        actions:
          type: array
          minItems: 1
          items:
            type: string
            minLength: 1
          example:
            - UPDATE_PASSWORD
      additionalProperties: false
    UserResponse:
      type: object
      properties:
        id:
          type: string
        username:
          type: string
        email:
          type: string
          nullable: true
        firstName:
          type: string
          nullable: true
        lastName:
          type: string
          nullable: true
        enabled:
          type: boolean
        emailVerified:
          type: boolean
        createdTimestamp:
          type: integer
          format: int64
          nullable: true
        attributes:
          $ref: '#/components/schemas/AttributeMap'
        groups:
          type: array
          items:
            $ref: '#/components/schemas/UserGroupResponse'
          description: Present only when `includeGroups=true` and the user has groups.
      additionalProperties: false
    UserGroupResponse:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        path:
          type: string
      additionalProperties: false
    UserSessionResponse:
      type: object
      properties:
        id:
          type: string
        userId:
          type: string
        username:
          type: string
        ipAddress:
          type: string
          nullable: true
        start:
          type: integer
          format: int64
        lastAccess:
          type: integer
          format: int64
        rememberMe:
          type: boolean
        clients:
          type: object
          additionalProperties:
            type: string
      additionalProperties: false
    CreateGroupRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          minLength: 1
        parentGroupId:
          type: string
          nullable: true
        attributes:
          $ref: '#/components/schemas/AttributeMap'
      additionalProperties: false
    UpdateGroupRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          minLength: 1
        attributes:
          $ref: '#/components/schemas/AttributeMap'
      additionalProperties: false
    GroupResponse:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        path:
          type: string
        attributes:
          $ref: '#/components/schemas/AttributeMap'
      additionalProperties: false
    CreateRoleRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          minLength: 1
        description:
          type: string
          nullable: true
      additionalProperties: false
    UpdateRoleRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          minLength: 1
        description:
          type: string
          nullable: true
      additionalProperties: false
    RoleResponse:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
          nullable: true
        composite:
          type: boolean
        clientRole:
          type: boolean
        containerId:
          type: string
          nullable: true
      additionalProperties: false
    CreateUserAttributeRequest:
      type: object
      required:
        - name
        - displayName
        - insensitive
      properties:
        name:
          type: string
          minLength: 1
          description: Public User Profile attribute name. Names prefixed with `__search_` are reserved.
        displayName:
          $ref: '#/components/schemas/LocalizedTextMap'
        insensitive:
          type: boolean
          description: Enables case-insensitive and accent-insensitive search metadata.
        required:
          type: boolean
          default: false
        multivalued:
          type: boolean
          default: false
      additionalProperties: false
    UpdateUserAttributeRequest:
      type: object
      required:
        - displayName
        - insensitive
      properties:
        displayName:
          $ref: '#/components/schemas/LocalizedTextMap'
        insensitive:
          type: boolean
          description: Enables case-insensitive and accent-insensitive search metadata.
        required:
          type: boolean
          default: false
        multivalued:
          type: boolean
          default: false
      additionalProperties: false
    UserAttributeResponse:
      type: object
      properties:
        name:
          type: string
        displayName:
          $ref: '#/components/schemas/LocalizedTextMap'
        insensitive:
          type: boolean
        required:
          type: boolean
        multivalued:
          type: boolean
      additionalProperties: false
    UserPageResponse:
      allOf:
        - $ref: '#/components/schemas/PageMetadata'
        - type: object
          properties:
            content:
              type: array
              items:
                $ref: '#/components/schemas/UserResponse'
    GroupPageResponse:
      allOf:
        - $ref: '#/components/schemas/PageMetadata'
        - type: object
          properties:
            content:
              type: array
              items:
                $ref: '#/components/schemas/GroupResponse'
    RolePageResponse:
      allOf:
        - $ref: '#/components/schemas/PageMetadata'
        - type: object
          properties:
            content:
              type: array
              items:
                $ref: '#/components/schemas/RoleResponse'
    PageMetadata:
      type: object
      required:
        - content
        - page
        - size
        - totalElements
        - totalPages
        - first
        - last
      properties:
        content:
          type: array
          items:
            type: object
        page:
          type: integer
          format: int32
        size:
          type: integer
          format: int32
        totalElements:
          type: integer
          format: int64
        totalPages:
          type: integer
          format: int32
        first:
          type: boolean
        last:
          type: boolean
      additionalProperties: false
    Problem:
      type: object
      properties:
        status:
          type: integer
          format: int32
        timestamp:
          type: string
          format: date-time
        title:
          type: string
        detail:
          type: string
        messages:
          type: array
          items:
            $ref: '#/components/schemas/ProblemObject'
      additionalProperties: false
      example:
        status: 400
        title: Invalid request data
        detail: One or more fields are invalid.
        timestamp: '2026-04-28T12:00:00-03:00'
        messages:
          - name: username
            message: username is required
    ProblemObject:
      type: object
      properties:
        name:
          type: string
        message:
          type: string
      additionalProperties: false
    HealthResponse:
      type: object
      properties:
        status:
          type: string
          enum:
            - UP
            - DOWN
        checks:
          type: array
          items:
            $ref: '#/components/schemas/HealthCheck'
      additionalProperties: true
    HealthCheck:
      type: object
      properties:
        name:
          type: string
        status:
          type: string
          enum:
            - UP
            - DOWN
        data:
          type: object
          additionalProperties: true
      additionalProperties: true
