services:
  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    container_name: backend-keycloak
    command:
      - start-dev
      - --import-realm
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: myKeycloakAdminUser
      KC_BOOTSTRAP_ADMIN_PASSWORD: tops3cr3t
      KC_DB: dev-file
      JAVA_TOOL_OPTIONS: >
        -agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=*:5005
    ports:
      - "8080:8080"
      - "5005:5005"
    healthcheck:
      test:
        ["CMD-SHELL", "curl -f http://localhost:8080/health/ready || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
